name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.26.1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Verify go.sum integrity
        run: go mod verify

      - name: Verify module tidiness
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run go vet
        run: go vet ./...

      - name: Build golangci-lint from locked module graph
        run: go build -o .bin/golangci-lint github.com/golangci/golangci-lint/v2/cmd/golangci-lint

      - name: Run golangci-lint
        run: .bin/golangci-lint run

      - name: Build sqlc from locked module graph
        run: go build -o .bin/sqlc github.com/sqlc-dev/sqlc/cmd/sqlc

      - name: Verify sqlc generated code is up-to-date
        run: |
          if ! .bin/sqlc diff; then
            echo "::error::sqlc-generated code is out of sync with query files. Run 'sqlc generate' and commit the result."
            exit 1
          fi

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build govulncheck from locked module graph
        run: go build -o .bin/govulncheck golang.org/x/vuln/cmd/govulncheck

      - name: Run govulncheck
        run: .bin/govulncheck ./...

      - name: Build gosec from locked module graph
        run: go build -o .bin/gosec github.com/securego/gosec/v2/cmd/gosec

      - name: Run gosec
        run: .bin/gosec ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./internal/...

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $NF}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          THRESHOLD=80
          if [ "$(echo "${COVERAGE} < ${THRESHOLD}" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below the ${THRESHOLD}% threshold"
            exit 1
          fi

      - name: Upload coverage
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, security, test]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        run: CGO_ENABLED=0 go build -trimpath -buildvcs=true -o .bin/charm-registry ./cmd/charm-registry
