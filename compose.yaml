services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: charm_registry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d charm_registry"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  create-bucket:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done
        mc mb --ignore-existing local/charm-registry

  # Generate a local CA and a TLS certificate for the OCI registry.
  # The certificate is stored in ./certs/ (bind-mounted from the host) so it
  # persists across restarts and can be installed into the system trust store
  # with `make install-cert`.  Generation is skipped when the files already
  # exist, so re-running `docker compose up` is safe.
  gen-certs:
    image: alpine:3.21
    volumes:
      - ./certs:/certs
    command:
      - sh
      - -euc
      - |
        if [ -f /certs/ca.crt ] && [ -f /certs/registry.crt ]; then
          echo "Registry TLS certificates already exist — skipping generation."
          exit 0
        fi
        apk add --no-cache openssl >/dev/null 2>&1
        mkdir -p /certs

        echo "Generating local CA…"
        openssl genrsa -out /certs/ca.key 4096
        openssl req -new -x509 -days 3650 \
          -key /certs/ca.key \
          -out /certs/ca.crt \
          -subj "/CN=Local Charm Registry CA"

        echo "Generating registry server certificate…"
        openssl genrsa -out /certs/registry.key 2048
        openssl req -new \
          -key /certs/registry.key \
          -out /certs/registry.csr \
          -subj "/CN=localhost"
        printf 'subjectAltName=DNS:localhost,IP:127.0.0.1\n' > /tmp/san.ext
        openssl x509 -req -days 3650 \
          -in /certs/registry.csr \
          -CA /certs/ca.crt -CAkey /certs/ca.key -CAcreateserial \
          -out /certs/registry.crt \
          -extfile /tmp/san.ext

        chmod 644 /certs/ca.crt /certs/registry.crt
        chmod 600 /certs/ca.key /certs/registry.key
        echo "TLS certificates written to ./certs/."
        echo "Run 'make install-cert' once to trust the CA on this machine."

  # OCI registry — served over TLS so that charmcraft's bundled skopeo can
  # push images without the --dest-tls-verify=false flag.
  registry:
    image: registry:2
    depends_on:
      gen-certs:
        condition: service_completed_successfully
    environment:
      REGISTRY_HTTP_TLS_CERTIFICATE: /certs/registry.crt
      REGISTRY_HTTP_TLS_KEY: /certs/registry.key
    ports:
      - "5000:5000"
    volumes:
      - registry-data:/var/lib/registry
      - ./certs:/certs:ro

  charm-registry:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
      create-bucket:
        condition: service_completed_successfully
      registry:
        condition: service_started
    environment:
      CHARM_REGISTRY_LISTEN: ":8080"
      CHARM_REGISTRY_PUBLIC_API_URL: "http://localhost:8080"
      CHARM_REGISTRY_PUBLIC_STORAGE_URL: "http://localhost:8080"
      CHARM_REGISTRY_PUBLIC_REGISTRY_URL: "https://localhost:5000"
      CHARM_REGISTRY_DATABASE_URL: "postgres://postgres:postgres@postgres:5432/charm_registry?sslmode=disable"
      CHARM_REGISTRY_S3_BUCKET: "charm-registry"
      CHARM_REGISTRY_S3_REGION: "us-east-1"
      CHARM_REGISTRY_S3_ENDPOINT: "http://minio:9000"
      CHARM_REGISTRY_S3_ACCESS_KEY_ID: "minioadmin"
      CHARM_REGISTRY_S3_SECRET_ACCESS_KEY: "minioadmin"
      CHARM_REGISTRY_S3_USE_PATH_STYLE: "true"
      CHARM_REGISTRY_ENABLE_INSECURE_DEV_AUTH: "true"
      CHARM_REGISTRY_REGISTRY_USERNAME: "registry"
      CHARM_REGISTRY_REGISTRY_PASSWORD: "registry-secret"
      CHARM_REGISTRY_REGISTRY_REPOSITORY_ROOT: "charms"
      CHARM_REGISTRY_SERVER_READ_HEADER_TIMEOUT: "10s"
      CHARM_REGISTRY_SERVER_READ_TIMEOUT: "30s"
      CHARM_REGISTRY_SERVER_WRITE_TIMEOUT: "30s"
      CHARM_REGISTRY_SERVER_IDLE_TIMEOUT: "2m"
      CHARM_REGISTRY_SERVER_SHUTDOWN_TIMEOUT: "30s"
      CHARM_REGISTRY_SERVER_MAX_HEADER_BYTES: "1048576"
      CHARM_REGISTRY_MAX_JSON_BODY_BYTES: "1048576"
      CHARM_REGISTRY_MAX_UPLOAD_BYTES: "67108864"
    cap_drop:
      - ALL
    ports:
      - "8080:8080"
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

volumes:
  postgres-data:
  minio-data:
  registry-data:
